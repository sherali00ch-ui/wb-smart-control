<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WB Smart Control — Главная</title>
  <style>
    :root{--bg:#f3f6fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--brand:#2f3b52;
    --ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--shadow:0 10px 30px rgba(0,0,0,.08);--r:16px;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(135deg,#111827,#2f3b52);color:#fff;padding:16px}
    .wrap{max-width:1200px;margin:0 auto;padding:16px}
    .nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .brand{font-weight:800}
    .menu{display:flex;gap:8px;flex-wrap:wrap}
    .menu a{color:#fff;text-decoration:none;padding:8px 10px;border:1px solid rgba(255,255,255,.25);border-radius:999px;font-size:13px}
    .menu a.active{background:rgba(255,255,255,.18)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:16px;margin-top:14px}
    h1{margin:0;font-size:18px}
    .hint{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.35}
    .kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
    @media (max-width:1000px){.kpi{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:560px){.kpi{grid-template-columns:1fr}}
    .kpiBox{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fff}
    .kpiBox .name{font-size:12px;color:var(--muted);margin-bottom:6px}
    .kpiBox .val{font-size:20px;font-weight:800}
    .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)} .muted{color:var(--muted)}
    table{width:100%;border-collapse:collapse;margin-top:12px;border:1px solid var(--line);border-radius:14px;overflow:hidden}
    th,td{padding:10px;border-bottom:1px solid var(--line);font-size:13px}
    th{background:#f8fafc;color:#374151;text-align:left}
    tr:last-child td{border-bottom:0}
    .right{text-align:right}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    button{border:0;border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer}
    .btn{background:var(--brand);color:#fff}
    .btn2{background:#eef2ff;color:#111827}
    .btn3{background:#fee2e2;color:#7f1d1d}
  </style>
</head>
<body>
<header>
  <div class="wrap nav">
    <div class="brand">WB Smart Control</div>
    <div class="menu">
      <a class="active" href="index.html">Главная</a>
      <a href="calculator.html">Калькулятор</a>
      <a href="products.html">Товары</a>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <h1>Главная (Dashboard)</h1>
    <p class="hint">Данные берутся из раздела <b>Товары</b>. Добавь товары — и здесь появится статистика.</p>

    <div class="actions">
      <button class="btn2" onclick="location.href='products.html'">Открыть «Товары»</button>
      <button class="btn2" onclick="location.href='calculator.html'">Открыть «Калькулятор»</button>
      <button class="btn" onclick="refresh()">Обновить</button>
      <button class="btn3" onclick="resetAll()">Сбросить данные</button>
    </div>

    <div class="kpi">
      <div class="kpiBox"><div class="name">Товаров</div><div class="val" id="kCount">—</div></div>
      <div class="kpiBox"><div class="name">В плюс / В минус</div><div class="val" id="kPM">—</div></div>
      <div class="kpiBox"><div class="name">Средний ROI</div><div class="val" id="kRoi">—</div></div>
      <div class="kpiBox"><div class="name">Сумма прибыли (по шт)</div><div class="val" id="kProfit">—</div></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Топ товаров (по прибыли/шт)</th>
          <th class="right">Прибыль/шт</th>
          <th class="right">ROI</th>
          <th class="right">Маржа</th>
        </tr>
      </thead>
      <tbody id="topRows">
        <tr><td class="muted">Нет данных</td><td class="right muted">—</td><td class="right muted">—</td><td class="right muted">—</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const KEY = "WB_PRODUCTS_V2";

  const clampPct = (p)=> Math.max(0, Math.min(100, p||0));
  const num = (v)=> { const x=parseFloat(v); return Number.isFinite(x)?x:0; };
  const rub = (v)=> Number.isFinite(v)?(v.toFixed(2)+" ₽"):"—";
  const pct = (v)=> Number.isFinite(v)?(v.toFixed(2)+"%"):"—";

  function loadProducts(){
    const raw = localStorage.getItem(KEY);
    if(!raw) return [];
    try{
      const arr = JSON.parse(raw);
      return Array.isArray(arr) ? arr : [];
    }catch(e){ return []; }
  }

  function calcOne(r){
    const B = clampPct(r.buyout||100)/100;
    if(B<=0) return {profit:NaN, roi:NaN, margin:NaN};

    const sell = num(r.sell);
    const buy  = num(r.buy);

    const commR = clampPct(r.commission)/100;
    const taxR  = clampPct(r.tax)/100;
    const wR    = clampPct(r.writeoff)/100;

    const revenue = sell;
    const commissionRub = revenue * commR;
    const taxRub = revenue * taxR;

    const returnedPerSold = (1 - B) / B;

    // Balanced model (как в калькуляторе)
    const shipTo   = num(r.shipTo)/B;
    const pack     = num(r.pack)/B;
    const shipBack = num(r.shipBack) * returnedPerSold;
    const writeoff = buy * wR * returnedPerSold;
    const storage  = num(r.storage);

    const totalCosts = buy + commissionRub + taxRub + shipTo + pack + shipBack + writeoff + storage;
    const profit = revenue - totalCosts;

    const roi = buy>0 ? (profit/buy)*100 : NaN;
    const margin = revenue>0 ? (profit/revenue)*100 : NaN;

    return {profit, roi, margin};
  }

  function refresh(){
    const products = loadProducts();
    const results = products.map(p=>{
      const out = calcOne(p);
      return {name: (p.name||"Товар"), ...out};
    });

    const count = results.length;
    let plus=0, minus=0, profitSum=0, roiSum=0, roiCnt=0;

    results.forEach(r=>{
      if(Number.isFinite(r.profit)){
        profitSum += r.profit;
        if(r.profit>=0) plus++; else minus++;
      }
      if(Number.isFinite(r.roi)){ roiSum += r.roi; roiCnt++; }
    });

    const roiAvg = roiCnt ? (roiSum/roiCnt) : NaN;

    document.getElementById("kCount").textContent = count;
    document.getElementById("kPM").textContent = `${plus} / ${minus}`;
    document.getElementById("kRoi").textContent = Number.isFinite(roiAvg)?pct(roiAvg):"—";
    document.getElementById("kRoi").className = "val " + (Number.isFinite(roiAvg) ? (roiAvg>=30?"ok":"warn") : "muted");
    document.getElementById("kProfit").textContent = rub(profitSum);
    document.getElementById("kProfit").className = "val " + (profitSum>=0?"ok":"bad");

    const top = results
      .filter(r=>Number.isFinite(r.profit))
      .sort((a,b)=>b.profit - a.profit)
      .slice(0,5);

    const tb = document.getElementById("topRows");
    if(top.length===0){
      tb.innerHTML = `<tr><td class="muted">Нет данных</td><td class="right muted">—</td><td class="right muted">—</td><td class="right muted">—</td></tr>`;
      return;
    }
    tb.innerHTML = top.map(r=>`
      <tr>
        <td>${escapeHtml(r.name)}</td>
        <td class="right">${rub(r.profit)}</td>
        <td class="right">${pct(r.roi)}</td>
        <td class="right">${pct(r.margin)}</td>
      </tr>
    `).join("");
  }

  function resetAll(){
    if(!confirm("Сбросить все данные товаров?")) return;
    localStorage.removeItem(KEY);
    refresh();
  }

  function escapeHtml(s){
    return String(s||"")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  refresh();
</script>
</body>
</html>
